<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Pro Betting</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #e60000; --dark: #121212; --yellow: #ffcc00; --glass: rgba(255, 255, 255, 0.1); }
        body { background: var(--red); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Glassmorphism Header */
        .top-nav { background: var(--glass); backdrop-filter: blur(10px); padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .balance-chip { background: var(--dark); padding: 8px 15px; border-radius: 20px; border: 1px solid var(--yellow); font-weight: bold; color: var(--yellow); }

        /* Animation Tube (ምስል 1 ላይ እንዳለው) */
        .draw-section { height: 180px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #333, #000); margin: 10px; border-radius: 20px; border: 4px solid #444; position: relative; }
        .tube-glass { width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid #666; display: flex; align-items: center; justify-content: center; position: relative; }
        .big-ball { width: 100px; height: 100px; background: radial-gradient(circle at 30% 30%, #fff, var(--yellow), #b8860b); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 3rem; color: black; font-weight: 900; box-shadow: 0 0 30px var(--yellow); animation: ballEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        
        @keyframes ballEnter { 0% { transform: scale(0) rotate(-180deg); } 100% { transform: scale(1) rotate(0); } }

        /* Keno Grid */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 5px; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px; margin: 10px; }
        .num { aspect-ratio: 1/1; background: var(--dark); display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 0.9rem; cursor: pointer; border: 1px solid #333; transition: 0.2s; }
        .num.selected { background: #007bff; border-color: white; transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .num.hit { background: var(--yellow); color: black; font-weight: bold; animation: glow 1s infinite alternate; }
        
        /* Action Panel */
        .action-panel { background: var(--dark); padding: 20px; border-radius: 30px 30px 0 0; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .bet-input-wrapper { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; text-align: center; font-size: 1.1rem; }
        .btn { padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-bet { background: var(--yellow); color: black; flex: 2; font-size: 1.1rem; }
        .btn-wallet { background: #28a745; color: white; width: 100%; margin-top: 10px; }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }

        /* Modal (Deposit/Withdraw) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; padding: 20px; }
        .modal-content { background: #222; padding: 20px; border-radius: 20px; border: 1px solid var(--yellow); }
    </style>
</head>
<body>

    <div class="top-nav">
        <div id="game-info">DRAW <b id="draw-id">#--</b></div>
        <div id="timer" style="color: var(--yellow); font-size: 1.2rem;">01:30</div>
        <div class="balance-chip"><span id="balance-val">0.00</span> ETB</div>
    </div>

    <div class="draw-section">
        <div class="tube-glass">
            <div id="big-ball" class="big-ball">?</div>
        </div>
        <div style="position: absolute; right: 20px; top: 10px; font-weight: bold;" id="count-display">0/20</div>
    </div>

    <div class="grid" id="keno-grid"></div>

    <div class="action-panel">
        <div class="bet-input-wrapper">
            <input type="number" id="bet-amt" placeholder="መጠን" value="10">
            <button class="btn btn-bet" id="bet-btn" onclick="placeBet()">አሁኑኑ ውራረድ</button>
        </div>
        <button class="btn btn-wallet" onclick="toggleModal(true)">Wallet (Deposit / Withdraw)</button>
    </div>

    <div id="wallet-modal" class="modal">
    <div class="modal-content" style="max-width: 400px; width: 90%;">
        <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
            <button onclick="switchTab('deposit')" id="dep-tab" style="flex:1; padding: 10px; background: var(--yellow); border:none; font-weight:bold;">DEPOSIT</button>
            <button onclick="switchTab('withdraw')" id="wit-tab" style="flex:1; padding: 10px; background: #333; color:white; border:none; font-weight:bold;">WITHDRAW</button>
        </div>

        <div id="deposit-sec">
            <p style="font-size: 0.9rem; color: #ccc;">ቢያንስ 50 ብር ማስገባት ይችላሉ።</p>
            <input type="number" id="dep-amount" placeholder="የብር መጠን (ሚኒመም 50)" min="50" style="width:100%; margin-bottom:10px;">
            <div style="background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 4px solid var(--yellow);">
                <small>በቴሌብር ወደዚህ ቁጥር ይላኩ:</small><br>
                <strong style="font-size: 1.2rem; color: var(--yellow);">0909090909</strong>
            </div>
            <button class="btn" style="background: #007bff; width: 100%; color: white;" onclick="sendToBot('deposit')">የደረሰኝ Screenshot ላክ</button>
        </div>

        <div id="withdraw-sec" style="display: none;">
            <p style="font-size: 0.9rem; color: #ccc;">ቢያንስ 100 ብር ማውጣት ይችላሉ።</p>
            <input type="number" id="wit-amount" placeholder="የብር መጠን (ሚኒመም 100)" min="100" style="width:100%; margin-bottom:10px;">
            <input type="text" id="wit-account" placeholder="የቴሌብር አካውንት (09...)" style="width:100%; margin-bottom:15px;">
            <button class="btn" style="background: #28a745; width: 100%; color: white;" onclick="sendToBot('withdraw')">የመውጫ ጥያቄ ላክ</button>
        </div>

        <button class="btn" style="margin-top: 15px; width: 100%; background: #444; color: white;" onclick="toggleModal(false)">ተመለስ</button>
    </div>
</div>

        </div>
    </div>

    <script>
        const socket = io("file:///storage/emulated/0/Android/data/com.teejay.trebedit/files/TrebEdit user files/server.js");
        const tele = window.Telegram.WebApp;
        tele.expand();

        let selected = [];
        let isDrawing = false;

        // Grid መፍጠር
        for (let i = 1; i <= 80; i++) {
            const d = document.createElement('div');
            d.className = 'num'; d.id = `n-${i}`; d.innerText = i;
            d.onclick = () => {
                if(isDrawing) return;
                if(selected.includes(i)) {
                    selected = selected.filter(x => x !== i); d.classList.remove('selected');
                } else if(selected.length < 10) {
                    selected.push(i); d.classList.add('selected');
                }
            };
            document.getElementById('keno-grid').appendChild(d);
        }

        socket.on('gameUpdate', data => {
            document.getElementById('timer').innerText = data.timer;
            if(data.status === "DRAWING") {
                isDrawing = true;
                document.getElementById('bet-btn').disabled = true;
            } else {
                isDrawing = false;
                document.getElementById('bet-btn').disabled = false;
                resetBoard();
            }
        });

        socket.on('drawResult', nums => {
            let i = 0;
            const interval = setInterval(() => {
                if(i < nums.length) {
                    showBigBall(nums[i]);
                    document.getElementById(`n-${nums[i]}`).classList.add('hit');
                    document.getElementById('count-display').innerText = `${i+1}/20`;
                    i++;
                } else { clearInterval(interval); }
            }, 1000);
        });

        function showBigBall(val) {
            const ball = document.getElementById('big-ball');
            ball.style.display = 'none';
            setTimeout(() => {
                ball.innerText = val;
                ball.style.display = 'flex';
                tele.HapticFeedback.impactOccurred('medium');
            }, 50);
        }

        function resetBoard() {
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
            document.getElementById('big-ball').style.display = 'none';
            document.getElementById('count-display').innerText = `0/20`;
        }

        function placeBet() {
            const amt = document.getElementById('bet-amt').value;
            if(selected.length < 1) return alert("ቢያንስ 1 ቁጥር ይምረጡ");
            socket.emit('placeBet', {
                userId: tele.initDataUnsafe.user.id,
                numbers: selected,
                amount: amt
            });
            tele.showConfirm("ውርርድዎ ተመዝግቧል!");
        }

        function toggleModal(show) {
            document.getElementById('wallet-modal').style.display = show ? 'flex' : 'none';
        }
    </script>
</body>
</html>
