<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Pro - Red Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --red: #d30000; --dark: #1a1a1a; --yellow: #ffcc00; --white: #ffffff; }
        body { background: var(--red); color: var(--white); font-family: 'Arial', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }

        /* Header Area */
        .header { background: rgba(0,0,0,0.5); padding: 10px; display: flex; justify-content: space-around; align-items: center; border-bottom: 2px solid var(--yellow); }
        .balance-box { background: var(--dark); padding: 5px 15px; border-radius: 20px; color: var(--yellow); border: 1px solid var(--yellow); font-weight: bold; }
        #timer { font-size: 1.5rem; font-weight: bold; color: var(--yellow); }

        /* Animation Section (Tube and Big Ball) */
        .draw-container { height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #333, #000); margin: 10px; border-radius: 15px; border: 3px solid #444; position: relative; }
        .big-ball { width: 90px; height: 90px; background: radial-gradient(circle at 30% 30%, #fff, var(--yellow), #b8860b); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 2.5rem; color: #000; font-weight: 900; box-shadow: 0 0 20px var(--yellow); animation: ballEnter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes ballEnter { 0% { transform: scale(0) rotate(-180deg); } 100% { transform: scale(1) rotate(0); } }

        /* Keno Grid (1-80) */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; max-width: 450px; margin: auto; }
        .num { aspect-ratio: 1/1; background: var(--dark); display: flex; align-items: center; justify-content: center; border-radius: 5px; font-size: 0.8rem; cursor: pointer; transition: 0.2s; border: 1px solid #333; }
        .num.selected { background: #0056b3; border: 2px solid white; transform: scale(1.05); }
        .num.hit { background: var(--yellow); color: black; font-weight: bold; box-shadow: 0 0 10px var(--yellow); }

        /* Betting & Wallet Panel */
        .action-panel { background: var(--dark); padding: 20px; border-radius: 25px 25px 0 0; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .bet-input-row { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="number"], input[type="text"] { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #333; color: white; text-align: center; }
        .btn { padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-bet { background: var(--yellow); color: black; flex: 2; font-size: 1rem; }
        .btn-wallet { background: #28a745; color: white; width: 100%; }

        /* Wallet Modal (Pop-up) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #222; width: 90%; max-width: 400px; padding: 20px; border-radius: 20px; border: 1px solid var(--yellow); }
        .tab-btn { flex: 1; padding: 10px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <div id="status">ቁጥር ይምረጡ</div>
        <div id="timer">01:30</div>
        <div class="balance-box"><span id="balance-val">0.00</span> ETB</div>
    </div>

    <div class="draw-container">
        <div id="big-ball" class="big-ball">?</div>
        <div style="margin-top: 10px; font-size: 0.8rem;" id="draw-count">0/20</div>
    </div>

    <div class="grid" id="keno-grid"></div>

    <div class="action-panel">
        <div class="bet-input-row">
            <input type="number" id="bet-amt" value="10" min="1">
            <button class="btn btn-bet" onclick="placeBet()">አሁኑኑ ውራረድ</button>
        </div>
        <button class="btn btn-wallet" onclick="toggleModal(true)">የገንዘብ ቦርሳ (Wallet)</button>
    </div>

    <div id="wallet-modal" class="modal">
        <div class="modal-content">
            <div style="display: flex; gap: 5px; margin-bottom: 20px;">
                <button class="tab-btn" id="dep-tab" onclick="switchTab('deposit')" style="background: var(--yellow);">DEPOSIT</button>
                <button class="tab-btn" id="wit-tab" onclick="switchTab('withdraw')" style="background: #333; color: white;">WITHDRAW</button>
            </div>

            <div id="deposit-sec">
                <p>ቢያንስ 50 ብር ያስገቡ</p>
                <input type="number" id="dep-amt" placeholder="የብር መጠን" style="width: 100%; margin-bottom: 10px;">
                <div style="background: #111; padding: 15px; border-radius: 10px; border-left: 5px solid var(--yellow); margin-bottom: 15px;">
                    <small>በቴሌብር ወደዚህ ቁጥር ይላኩ:</small><br>
                    <strong style="font-size: 1.2rem; color: var(--yellow);">0909090909</strong>
                </div>
                <button class="btn" style="background: #007bff; width: 100%; color: white;" onclick="closeAndPhoto()">የደረሰኝ Screenshot ላክ</button>
            </div>

            <div id="withdraw-sec" style="display: none;">
                <p>ቢያንስ 100 ብር ማውጣት ይችላሉ</p>
                <input type="number" id="wit-amt" placeholder="የብር መጠን" style="width: 100%; margin-bottom: 10px;">
                <input type="text" id="wit-acc" placeholder="የቴሌብር ቁጥር (09...)" style="width: 100%; margin-bottom: 15px;">
                <button class="btn" style="background: #28a745; width: 100%; color: white;" onclick="sendWithdraw()">የመውጫ ጥያቄ ላክ</button>
            </div>

            <button class="btn" style="width: 100%; margin-top: 15px; background: #444; color: white;" onclick="toggleModal(false)">ዝጋ</button>
        </div>
    </div>

    <script>
        // ሰርቨር ግንኙነት (Render ሊንክህን እዚህ አስገባ)
        const socket = io("https://abay-bot-4i45.vercel.app/");
        const tele = window.Telegram.WebApp;
        tele.expand();

        let selectedNumbers = [];
        let isDrawing = false;

        // 1. Grid መፍጠር
        const grid = document.getElementById('keno-grid');
        for (let i = 1; i <= 80; i++) {
            const div = document.createElement('div');
            div.className = 'num'; div.id = `n-${i}`; div.innerText = i;
            div.onclick = () => {
                if(isDrawing) return;
                if(selectedNumbers.includes(i)) {
                    selectedNumbers = selectedNumbers.filter(n => n !== i); div.classList.remove('selected');
                } else if(selectedNumbers.length < 10) {
                    selectedNumbers.push(i); div.classList.add('selected');
                }
            };
            grid.appendChild(div);
        }

        // 2. ከሰርቨር የሚመጡ መረጃዎች
        socket.on('gameUpdate', (data) => {
            document.getElementById('timer').innerText = data.timer;
            document.getElementById('status').innerText = data.status;
            if(data.status === "DRAWING") {
                isDrawing = true;
            } else {
                if(isDrawing) resetGameUI();
                isDrawing = false;
            }
        });

        socket.on('drawResult', (winningNums) => {
            let i = 0;
            const interval = setInterval(() => {
                if(i < winningNums.length) {
                    const num = winningNums[i];
                    showBallAnimation(num);
                    document.getElementById(`n-${num}`).classList.add('hit');
                    document.getElementById('draw-count').innerText = `${i+1}/20`;
                    i++;
                } else { clearInterval(interval); }
            }, 1000);
        });

        // 3. Functions
        function showBallAnimation(val) {
            const ball = document.getElementById('big-ball');
            ball.style.display = 'none';
            setTimeout(() => {
                ball.innerText = val;
                ball.style.display = 'flex';
                tele.HapticFeedback.impactOccurred('medium');
            }, 50);
        }

        function resetGameUI() {
            document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
            document.getElementById('big-ball').style.display = 'none';
            document.getElementById('draw-count').innerText = "0/20";
        }

        function placeBet() {
            const amt = document.getElementById('bet-amt').value;
            if(selectedNumbers.length < 1) return alert("ቢያንስ 1 ቁጥር ይምረጡ");
            socket.emit('placeBet', {
                userId: tele.initDataUnsafe.user.id,
                numbers: selectedNumbers,
                amount: amt
            });
            alert("ውርርድ ተመዝግቧል!");
        }

        // 4. Wallet Logic
        function toggleModal(show) { document.getElementById('wallet-modal').style.display = show ? 'flex' : 'none'; }

        function switchTab(type) {
            const isDep = type === 'deposit';
            document.getElementById('deposit-sec').style.display = isDep ? 'block' : 'none';
            document.getElementById('withdraw-sec').style.display = isDep ? 'none' : 'block';
            document.getElementById('dep-tab').style.background = isDep ? 'var(--yellow)' : '#333';
            document.getElementById('wit-tab').style.background = isDep ? '#333' : 'var(--yellow)';
            document.getElementById('wit-tab').style.color = isDep ? 'white' : 'black';
        }

        function closeAndPhoto() {
            const amt = document.getElementById('dep-amt').value;
            if(amt < 50) return alert("ቢያንስ 50 ብር ማስገባት አለብዎት!");
            alert("አሁን Mini App-ቡ ይዘጋል። እባክዎ የደረሰኝ ፎቶ ቦቱ ላይ ይላኩ።");
            tele.close();
        }

        function sendWithdraw() {
            const amt = document.getElementById('wit-amt').value;
            const acc = document.getElementById('wit-acc').value;
            if(amt < 100) return alert("ቢያንስ 100 ብር!");
            if(acc.length < 10) return alert("ትክክለኛ ቁጥር ያስገቡ");
            
            socket.emit('withdrawRequest', {
                userId: tele.initDataUnsafe.user.id,
                userName: tele.initDataUnsafe.user.first_name,
                amount: amt,
                account: acc
            });
            alert("የመውጫ ጥያቄ ለአድሚን ተልኳል!");
            toggleModal(false);
        }
    </script>
</body>
</html>
