<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keno Red Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-red: #d30000; --dark-red: #8b0000; --gold: #ffcc00; }
        body { background: var(--main-red); color: white; font-family: 'Arial', sans-serif; margin: 0; text-align: center; }
        
        /* Header & Stats */
        .stats-bar { background: var(--dark-red); padding: 15px; display: flex; justify-content: space-around; font-weight: bold; border-bottom: 2px solid var(--gold); }
        #timer { font-size: 2rem; color: var(--gold); text-shadow: 2px 2px 5px black; }

        /* እጣው የሚወጣበት ቦታ (Drawing Board) */
        .draw-board {
            min-height: 150px; background: rgba(0,0,0,0.4); margin: 15px; border-radius: 15px;
            display: flex; flex-wrap: wrap; align-items: center; justify-content: center; padding: 10px;
            border: 2px dashed var(--gold);
        }
        .draw-ball {
            width: 45px; height: 45px; background: radial-gradient(circle, #fff, var(--gold)); color: black;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: bold; margin: 5px; animation: pop 0.4s ease;
        }

        /* 1-80 Grid */
        .grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; padding: 10px; max-width: 450px; margin: auto; }
        .num { width: 35px; height: 35px; background: #333; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; cursor: pointer; transition: 0.3s; }
        .num.selected { background: #0056b3; border: 2px solid white; transform: scale(1.1); }
        .num.hit { background: var(--gold); color: black; font-weight: bold; box-shadow: 0 0 10px var(--gold); }

        /* Bet Section */
        .bet-box { background: var(--dark-red); padding: 20px; border-radius: 20px 20px 0 0; margin-top: 20px; }
        input { padding: 10px; border-radius: 5px; border: none; width: 80px; margin-right: 10px; }
        .btn-bet { background: var(--gold); color: black; padding: 12px 30px; border: none; border-radius: 25px; font-weight: bold; font-size: 1rem; }
        
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="stats-bar">
        <div>ባላንስ: <span id="balance">0.00</span> ETB</div>
        <div id="status">BETTING...</div>
    </div>

    <div id="timer">01:30</div>

    <div class="draw-board" id="draw-board">
        <p id="msg">እባክዎ 10 ቁጥሮችን ይምረጡ</p>
    </div>

    <div class="grid" id="grid"></div>

    <div class="bet-box">
        <input type="number" id="bet-amount" placeholder="ETB" value="10">
        <button class="btn-bet" onclick="placeBet()">አሁኑኑ ውራረድ</button>
    </div>

    <script>
        const socket = io("YOUR_BACKEND_URL"); // የሰርቨርህ ሊንክ
        let selected = [];
        const grid = document.getElementById('grid');

        // 1-80 Grid መፍጠር
        for (let i = 1; i <= 80; i++) {
            const div = document.createElement('div');
            div.className = 'num'; div.id = `n-${i}`; div.innerText = i;
            div.onclick = () => {
                if(selected.includes(i)) {
                    selected = selected.filter(x => x !== i); div.classList.remove('selected');
                } else if(selected.length < 10) {
                    selected.push(i); div.classList.add('selected');
                }
            };
            grid.appendChild(div);
        }

        socket.on('gameUpdate', (data) => {
            document.getElementById('timer').innerText = data.timer;
            document.getElementById('status').innerText = data.status;
            if(data.status === "BETTING") {
                document.getElementById('draw-board').innerHTML = '<p>ቀጣይ ጨዋታ እየተጠበቀ ነው...</p>';
                document.querySelectorAll('.num').forEach(n => n.classList.remove('hit'));
            }
        });

        socket.on('drawResult', (winningNumbers) => {
            const board = document.getElementById('draw-board');
            board.innerHTML = "";
            let i = 0;
            const interval = setInterval(() => {
                if(i < winningNumbers.length) {
                    const ball = document.createElement('div');
                    ball.className = 'draw-ball';
                    ball.innerText = winningNumbers[i];
                    board.appendChild(ball);
                    document.getElementById(`n-${winningNumbers[i]}`).classList.add('hit');
                    i++;
                } else { clearInterval(interval); }
            }, 800);
        });

        function placeBet() {
            const amt = document.getElementById('bet-amount').value;
            if(selected.length !== 10) return alert("10 ቁጥር ይምረጡ");
            socket.emit('placeBet', { userId: "USER_ID", numbers: selected, amount: amt });
        }
    </script>
</body>
</html>
